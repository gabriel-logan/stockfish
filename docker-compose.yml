services:
  api-db:
    image: postgres:17-bookworm
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=stockfish
      - POSTGRES_PASSWORD=stockfish
      - POSTGRES_DB=stockfish_api
    volumes:
      - api-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockfish -d stockfish_api"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-dev-db:
    image: postgres:17-bookworm
    environment:
      - POSTGRES_USER=stockfish
      - POSTGRES_PASSWORD=stockfish
      - POSTGRES_DB=stockfish_api_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockfish -d stockfish_api_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - tools

  atlas:
    image: arigaio/atlas:latest
    working_dir: /app
    volumes:
      - ./api:/app
    environment:
      - DATABASE_URL=postgres://stockfish:stockfish@api-db:5432/stockfish_api?sslmode=disable
      - DEV_DATABASE_URL=postgres://stockfish:stockfish@api-dev-db:5432/stockfish_api_dev?sslmode=disable
    depends_on:
      api-db:
        condition: service_healthy
      api-dev-db:
        condition: service_healthy
    profiles:
      - tools

  api:
    build: ./api
    ports:
      - "6090:6090"
    environment:
      - HOST=0.0.0.0
      - PORT=6090
      - DATABASE_URL=postgres://stockfish:stockfish@api-db:5432/stockfish_api?sslmode=disable
      - JWT_SECRET=${API_JWT_SECRET:-change-me-in-production}
      - CORS_ALLOWED_ORIGINS=${API_CORS_ALLOWED_ORIGINS:-*}
    depends_on:
      api-db:
        condition: service_healthy

  engine:
    build: ./engine
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - STOCKFISH_PATH=/usr/local/bin/stockfish

  web:
    image: node:22-bookworm-slim
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    working_dir: /app
    volumes:
      - ./web:/app
    ports:
      - "5173:5173"
    command: >
      bash -c "
        mkdir -p /tmp/corepack /tmp/pnpm &&
        corepack enable --install-directory /tmp/pnpm &&
        /tmp/pnpm/pnpm install --frozen-lockfile --store-dir /tmp/pnpm/store &&
        /tmp/pnpm/pnpm build &&
        /tmp/pnpm/pnpm preview --host 0.0.0.0 --port 5173
      "
    environment:
      - CI=true
      - HOME=/tmp
      - COREPACK_HOME=/tmp/corepack
      - PNPM_HOME=/tmp/pnpm
      - VITE_ENGINE_BASE_URL=http://${HOST_IP:-localhost}:3000
      - VITE_ENGINE_BASE_URL_WS=ws://${HOST_IP:-localhost}:3000/ws
      - VITE_API_BASE_URL=http://${HOST_IP:-localhost}:6090
      - VITE_API_BASE_URL_WS=ws://${HOST_IP:-localhost}:6090
    depends_on:
      - api
      - engine

volumes:
  api-db-data:
