services:
  engine:
    build: ./engine
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - STOCKFISH_PATH=/usr/local/bin/stockfish

  web:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - ./web:/app
    ports:
      - "5173:5173"
    command: >
      bash -c "
        corepack enable &&
        pnpm install --frozen-lockfile &&
        pnpm build &&
        pnpm preview --host 0.0.0.0 --port 5173
      "
    environment:
      - CI=true
      - VITE_ENGINE_BASE_URL=http://${HOST_IP:-localhost}:3000
      - VITE_ENGINE_BASE_URL_WS=ws://${HOST_IP:-localhost}:3000/ws
    depends_on:
      - engine
